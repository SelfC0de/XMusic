name: Build & Pre-Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/SelfMusic-v${{ steps.version.outputs.version }}.apk

      - name: Delete old pre-release
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tag_pattern: pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release-v${{ steps.version.outputs.version }}
          name: "Self Music v${{ steps.version.outputs.version }} (Pre-Release)"
          prerelease: true
          files: app/build/outputs/apk/debug/SelfMusic-v${{ steps.version.outputs.version }}.apk
          body: |
            **Self Music v${{ steps.version.outputs.version }}**
            
            Автоматическая сборка debug APK.
            
            Скачайте APK ниже для установки.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
