name: Build APK

on:
  workflow_dispatch:
    inputs:
      run_reason:
        description: 'Build reason (optional)'
        required: false
        default: 'manual build'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar size: $(du -sh gradle/wrapper/gradle-wrapper.jar)"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create required empty dirs
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SelfMusic-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
